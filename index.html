<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock App</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
    margin:0;
}

h1,h2,h3{
    color:#333;
}

.top-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.second-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:15px;
}

button{
    border:none;
    color:white;
    cursor:pointer;
}

.add-btn{
    background:#007AFF;
}

.cash-btn{
    background:#34C759;
}

.transfer-btn{
    background:#007AFF;
}

.delete-btn{
    background:red;
}

.edit-btn{
    background:#FF9500;
}

.export-btn{
    background:green;
}

.reset-btn{
    background:gray;
}

.sort-btn{
    background:#5856D6;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
    vertical-align:top;
}

th{
    background:#007AFF;
    color:white;
}

.stock-low{
    color:red;
    font-weight:bold;
}

.sale-history{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

.group-title{
    margin-top:30px;
    margin-bottom:10px;
}

.action-btn{
    margin-bottom:6px;
}

@media(max-width:900px){

    .top-grid,
    .second-grid{
        grid-template-columns:1fr;
    }

    table{
        font-size:12px;
    }

    th,td{
        padding:6px;
    }
    .icon-btn,
    .stock-btn{

        width:auto;
        padding:4px 8px;
        margin-left:5px;
        margin-top:5px;
        font-size:14px;
    }
}

</style>
</head>

<body>

<h1>📦 Stock App</h1>

<div class="top-grid">

<div class="card">

<h2>➕ เพิ่ม / เติมสต๊อกสินค้า</h2>

<input type="text" id="name" placeholder="ชื่อสินค้า">

<select id="category">

<option>Punch Needle Keychain</option>
<option>Punch Needle Rug Mug</option>
<option>Punch Needle Hair Clip</option>
<option>Punch Needle Magnet</option>
<option>Beading</option>
<option>Tote Bag</option>
<option>Cable tie</option>
<option>Shoes Accessories</option>
<option>Hair Accessories</option>

</select>

<input type="number" id="stock" placeholder="จำนวน">

<input type="number" id="price" placeholder="ราคา">

<button class="add-btn" onclick="addProduct()">
เพิ่มสินค้า / เติมสต๊อก
</button>

</div>

<div class="card">

<h2>📊 รายงานรายวัน</h2>

<p>ยอดขายรวม: <b><span id="totalSales">0</span></b> บาท</p>

<p>เงินสด: <b><span id="cashSales">0</span></b> บาท</p>

<p>เงินโอน: <b><span id="transferSales">0</span></b> บาท</p>

<p>จำนวนสินค้าที่ขาย: <b><span id="totalItems">0</span></b> ชิ้น</p>

<button class="export-btn" onclick="exportCSV()">
Export CSV
</button>

<button class="export-btn" onclick="exportBackup()">
Backup ข้อมูล
</button>

<button class="reset-btn" onclick="clearSalesHistory()">
ล้างประวัติการขาย
</button>

<button class="reset-btn" onclick="resetData()">
รีเซ็ตข้อมูลทั้งหมด
</button>

</div>

</div>

<div class="second-grid">

<div class="card">

<h2>📥 กู้ข้อมูล Backup</h2>

<input type="file" id="importFile" accept=".json">

<button class="export-btn" onclick="importBackup()">
Import Backup
</button>

</div>

<div class="card">

<h2>🔍 ค้นหา / จัดเรียงสินค้า</h2>

<input
type="text"
id="searchInput"
placeholder="ค้นหาสินค้า..."
onkeyup="renderProducts()"
>

<button class="sort-btn" onclick="sortProducts('name')">
เรียงตาม A-Z
</button>

<button class="sort-btn" onclick="sortProducts('date')">
เรียงตามวันที่เพิ่ม
</button>

<button class="sort-btn" onclick="sortProducts('price')">
เรียงตามราคา
</button>

<button class="sort-btn" onclick="sortProducts('stock')">
เรียงตามจำนวนสต๊อก
</button>

</div>

</div>

<div id="productTables"></div>

<div class="card" style="margin-top:20px;">

<h2>🧾 ประวัติการขาย</h2>

<div id="salesHistory"></div>

</div>

<script>

const categoryOrder = [

"Punch Needle Keychain",
"Punch Needle Rug Mug",
"Punch Needle Hair Clip",
"Punch Needle Magnet",
"Beading",
"Tote Bag",
"Cable tie",
"Shoes Accessories",
"Hair Accessories"

]

let products =
JSON.parse(localStorage.getItem("products")) || []

let salesHistory =
JSON.parse(localStorage.getItem("salesHistory")) || []

let totalSales =
Number(localStorage.getItem("totalSales")) || 0

let cashSales =
Number(localStorage.getItem("cashSales")) || 0

let transferSales =
Number(localStorage.getItem("transferSales")) || 0

let totalItems =
Number(localStorage.getItem("totalItems")) || 0

updateSummary()
renderProducts()
renderSalesHistory()

function saveData(){

    localStorage.setItem(
        "products",
        JSON.stringify(products)
    )

    localStorage.setItem(
        "salesHistory",
        JSON.stringify(salesHistory)
    )

    localStorage.setItem(
        "totalSales",
        totalSales
    )

    localStorage.setItem(
        "cashSales",
        cashSales
    )

    localStorage.setItem(
        "transferSales",
        transferSales
    )

    localStorage.setItem(
        "totalItems",
        totalItems
    )
}

function getProductById(id){

    return products.find(
        product => product.id === id
    )
}

function addProduct(){

    let name =
    document.getElementById("name").value.trim()

    let category =
    document.getElementById("category").value

    let stock =
    Number(document.getElementById("stock").value)

    let price =
    Number(document.getElementById("price").value)

    if(name === "" || stock <= 0 || price <= 0){

        alert("กรอกข้อมูลให้ครบ")

        return
    }

    let existingProduct = products.find(
        p => p.name.toLowerCase() === name.toLowerCase()
    )

    if(existingProduct){

        existingProduct.stock += stock
        existingProduct.price = price

        alert("เติมสต๊อกสินค้าแล้ว")

    }else{

        products.push({

            id:Date.now(),

            createdAt:Date.now(),

            name,
            category,
            stock,
            price,

            sold:0,
            revenue:0

        })

        alert("เพิ่มสินค้าใหม่แล้ว")
    }

    saveData()

    renderProducts()

    document.getElementById("name").value = ""
    document.getElementById("stock").value = ""
    document.getElementById("price").value = ""
}

function renderProducts(){

    let search =
    document.getElementById("searchInput")
    .value.toLowerCase()

    let html = ""

    categoryOrder.forEach(category => {

        let categoryProducts =
        products.filter(product =>

            product.category === category &&

            product.name
            .toLowerCase()
            .includes(search)

        )

        if(categoryProducts.length === 0){
            return
        }

        html += `
        <h2 class="group-title">
        ${category}
        </h2>

        <div style="overflow-x:auto;">

        <table>

        <thead>

        <tr>

        <th>หมวดหมู่</th>
        <th>สินค้า</th>
        <th>สต๊อก</th>
        <th>ราคา</th>
        <th>ขายแล้ว</th>
        <th>รายได้</th>
        <th>จัดการ</th>

        </tr>

        </thead>

        <tbody>
        `

        categoryProducts.forEach(product => {

            html += `
            <tr>

            <td>

            ${product.category}

            <button
            class="icon-btn"
            onclick="changeCategory(${product.id})">
            🗂️
            </button>

            </td>

            <td>

            ${product.name}

            <button
            class="icon-btn"
            onclick="editProductName(${product.id})">
            ✏️
            </button>

            </td>

            <td class="${
                product.stock <= 3
                ? 'stock-low'
                : ''
            }">

            ${product.stock}

            <button
            class="stock-btn"
            onclick="decreaseStock(${product.id})">
            ➖
            </button>

            <button
            class="stock-btn"
            onclick="increaseStock(${product.id})">
            ➕
            </button>

            </td>

            <td>

            ${product.price} บาท

            <button
            class="icon-btn"
            onclick="editPrice(${product.id})">
            💰
            </button>

            </td>

            <td>
            ${product.sold}
            </td>

            <td>
            ${product.revenue}
            </td>

            <td>

            <button
            class="cash-btn"
            onclick="sellProduct(${product.id},'cash')">

            💵 เงินสด

            </button>

            <button
            class="transfer-btn"
            onclick="sellProduct(${product.id},'transfer')">

            📱 เงินโอน

            </button>

            <button
            class="delete-btn"
            onclick="deleteProduct(${product.id})">

            🗑️ ลบสินค้า

            </button>

            </td>

            </tr>
            `
        })

        html += `
        </tbody>

        </table>

        </div>
        `
    })

    document.getElementById("productTables").innerHTML =
    html
}

function editProductName(id){

    let product = getProductById(id)

    let newName = prompt(
        "แก้ชื่อสินค้า",
        product.name
    )

    if(newName && newName.trim() !== ""){

        product.name =
        newName.trim()

        saveData()

        renderProducts()
    }
}

function editPrice(id){

    let product = getProductById(id)

    let newPrice = prompt(
        "แก้ราคาสินค้า",
        product.price
    )

    if(newPrice){

        product.price =
        Number(newPrice)

        saveData()

        renderProducts()
    }
}

function changeCategory(id){

    let product = getProductById(id)

    let newCategory = prompt(
`ใส่ชื่อหมวดใหม่

Punch Needle Keychain
Punch Needle Rug Mug
Punch Needle Hair Clip
Punch Needle Magnet
Beading
Tote Bag
Cable tie
Shoes Accessories
Hair Accessories`,
        product.category
    )

    if(newCategory){

        product.category =
        newCategory.trim()

        saveData()

        renderProducts()
    }
}

function increaseStock(id){

    let product = getProductById(id)

    product.stock++

    saveData()

    renderProducts()
}

function decreaseStock(id){

    let product = getProductById(id)

    if(product.stock > 0){

        product.stock--

        saveData()

        renderProducts()
    }
}

function sellProduct(id,paymentType){

    let product = getProductById(id)
    let confirmSell = confirm(

`ยืนยันการขายสินค้า?

สินค้า: ${product.name}
ราคา: ${product.price} บาท
ชำระ: ${
paymentType === "cash"
? "เงินสด"
: "เงินโอน"
}`

)

if(!confirmSell){
    return
}

    if(product.stock <= 0){

        alert("สินค้าหมด")

        return
    }

    product.stock--

    product.sold++

    product.revenue +=
    product.price

    totalSales +=
    product.price

    totalItems++

    if(paymentType === "cash"){

        cashSales +=
        product.price

    }else{

        transferSales +=
        product.price
    }

    let now = new Date()

    salesHistory.unshift({

        product:
        product.name,

        category:
        product.category,

        price:
        product.price,

        payment:
        paymentType === "cash"
        ? "เงินสด"
        : "เงินโอน",

        date:
        now.toLocaleDateString(),

        time:
        now.toLocaleTimeString()

    })

    saveData()

    updateSummary()

    renderProducts()

    renderSalesHistory()"
        
}

function deleteProduct(id){

    let index =
    products.findIndex(
        p => p.id === id
    )

    if(confirm("ลบสินค้านี้ใช่ไหม?")){

        products.splice(index,1)

        saveData()

        renderProducts()
    }
}

function updateSummary(){

    document.getElementById("totalSales")
    .innerText = totalSales

    document.getElementById("cashSales")
    .innerText = cashSales

    document.getElementById("transferSales")
    .innerText = transferSales

    document.getElementById("totalItems")
    .innerText = totalItems
}

function renderSalesHistory(){

    function deleteSale(index){

    let sale = salesHistory[index]

    let confirmDelete = confirm(

`ลบรายการขายนี้?

สินค้า: ${sale.product}
ราคา: ${sale.price} บาท`

    )

    if(!confirmDelete){
        return
    }

    let product = products.find(
        p => p.name === sale.product
    )

    if(product){

        product.stock++

        product.sold--

        product.revenue -= sale.price
    }

    totalSales -= sale.price

    totalItems--

    if(sale.payment === "เงินสด"){

        cashSales -= sale.price

    }else{

        transferSales -= sale.price
    }

    salesHistory.splice(index,1)

    saveData()

    updateSummary()

    renderProducts()

    renderSalesHistory()
}

    let html = ""

    salesHistory.forEach(sale => {

        html += `
        <div class="sale-history">

        <b>${sale.product}</b><br>

        หมวด:
        ${sale.category}<br>

        ราคา:
        ${sale.price} บาท<br>

        ชำระ:
        ${sale.payment}<br>

        วันที่:
        ${sale.date}<br>

        เวลา:
        ${sale.time}
        <br><br>

<button
class="delete-btn"
onclick="deleteSale(${index})">

ลบรายการนี้

</button>

        </div>
        `
    })

    document.getElementById("salesHistory")
    .innerHTML = html
}

function sortProducts(type){

    if(type === "name"){

        products.sort((a,b)=>

            a.name.localeCompare(
                b.name,
                'th'
            )

        )
    }

    if(type === "date"){

        products.sort((a,b)=>

            b.createdAt - a.createdAt

        )
    }

    if(type === "price"){

        products.sort((a,b)=>

            b.price - a.price

        )
    }

    if(type === "stock"){

        products.sort((a,b)=>

            b.stock - a.stock

        )
    }

    renderProducts()

    saveData()
}

function exportCSV(){

    let csv =
`ชื่อสินค้า,หมวดหมู่,คงเหลือ,ราคา,ขายแล้ว,รายได้\n`

    products.forEach(product => {

        csv +=
`${product.name},${product.category},${product.stock},${product.price},${product.sold},${product.revenue}\n`

    })

    csv += `\n`

    csv +=
`สินค้า,หมวดหมู่,ราคา,การชำระเงิน,วันที่,เวลา\n`

    salesHistory.forEach((sale,index) => {

        csv +=
`${sale.product},${sale.category},${sale.price},${sale.payment},${sale.date},${sale.time}\n`

    })

    let blob = new Blob(
        [csv],
        {type:'text/csv;charset=utf-8;'}
    )

    let link =
    document.createElement("a")

    link.href =
    URL.createObjectURL(blob)

    link.download =
    "stock-report.csv"

    link.click()
}

function exportBackup(){

    let backupData = {

        products,
        salesHistory,
        totalSales,
        cashSales,
        transferSales,
        totalItems

    }

    let blob = new Blob(

        [JSON.stringify(backupData)],

        {type:"application/json"}

    )

    let link =
    document.createElement("a")

    link.href =
    URL.createObjectURL(blob)

    link.download =
    "stock-backup.json"

    link.click()

    alert("Backup สำเร็จ")
}

async function importBackup(){

    try{

        let file =
        document.getElementById("importFile")
        .files[0]

        if(!file){

            alert("กรุณาเลือกไฟล์")

            return
        }

        let text =
        await file.text()

        let data =
        JSON.parse(text)

        products =
        data.products || []

        salesHistory =
        data.salesHistory || []

        totalSales =
        data.totalSales || 0

        cashSales =
        data.cashSales || 0

        transferSales =
        data.transferSales || 0

        totalItems =
        data.totalItems || 0

        saveData()

        updateSummary()

        renderProducts()

        renderSalesHistory()

        alert("Import สำเร็จ")

    }catch(error){

        console.log(error)

        alert("Import ไม่สำเร็จ")
    }
}

function clearSalesHistory(){

    if(confirm("ล้างประวัติการขายทั้งหมดใช่ไหม?")){

        salesHistory = []

        totalSales = 0

        cashSales = 0

        transferSales = 0

        totalItems = 0

        products.forEach(product => {

            product.sold = 0

            product.revenue = 0

        })

        saveData()

        updateSummary()

        renderProducts()

        renderSalesHistory()
    }
}

function resetData(){

    if(confirm("ล้างข้อมูลทั้งหมดใช่ไหม?")){

        localStorage.clear()

        location.reload()
    }
}

</script>

</body>
</html>
