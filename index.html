<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock App</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    color:#333;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:16px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    margin-top:5px;
    font-size:15px;
}

.add-btn{
    background:#007AFF;
    width:100%;
}

.cash-btn{
    background:#34C759;
}

.transfer-btn{
    background:#007AFF;
}

.delete-btn{
    background:red;
}

.export-btn{
    background:green;
}

.reset-btn{
    background:gray;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
}

.stock-low{
    color:red;
    font-weight:bold;
}

.sale-history{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

</style>
</head>

<body>

<h1>📦 Stock App</h1>

<div class="card">

<h2>เพิ่ม / เติมสต๊อกสินค้า</h2>

<input type="text" id="name" placeholder="ชื่อสินค้า">

<select id="category">
    <option>Punch Needle Keychain</option>
    <option>Punch Needle Rug Mug</option>
    <option>Punch Needle Hair Clip</option>
    <option>Punch Needle Magnet</option>
    <option>Beading</option>
    <option>Tote Bag</option>
    <option>Cable tie</option>
    <option>Shoes Accessories</option>
    <option>Hair Accessories</option>
</select>

<input type="number" id="stock" placeholder="จำนวน">

<input type="number" id="price" placeholder="ราคา">

<button class="add-btn" onclick="addProduct()">
เพิ่มสินค้า / เติมสต๊อก
</button>

</div>

<div class="card">

<h2>📊 รายงานรายวัน</h2>

<p>ยอดขายรวม: <span id="totalSales">0</span> บาท</p>

<p>เงินสด: <span id="cashSales">0</span> บาท</p>

<p>เงินโอน: <span id="transferSales">0</span> บาท</p>

<p>จำนวนสินค้าที่ขาย: <span id="totalItems">0</span> ชิ้น</p>

<button class="export-btn" onclick="exportCSV()">
Export CSV
</button>

<button class="export-btn" onclick="exportBackup()">
Backup ข้อมูล
</button>

<button class="reset-btn" onclick="resetData()">
รีเซ็ตข้อมูล
</button>

<button class="reset-btn" onclick="clearSalesHistory()">
ล้างประวัติการขาย
</button>

<p>📥 กู้ข้อมูล Backup</p>

<input type="file" id="importFile" accept=".json">

<button class="export-btn" onclick="importBackup()">
Import Backup
</button>

</div>

<div class="card">

<h2>🔍 ค้นหาสินค้า</h2>

<input
type="text"
id="searchInput"
placeholder="ค้นหาสินค้า..."
onkeyup="renderProducts()"
>

</div>

<div id="productList"></div>

<div class="card">

<h2>🧾 ประวัติการขาย</h2>

<div id="salesHistory"></div>

</div>

<script>

let products =
JSON.parse(localStorage.getItem("products")) || []

let salesHistory =
JSON.parse(localStorage.getItem("salesHistory")) || []

let totalSales =
Number(localStorage.getItem("totalSales")) || 0

let cashSales =
Number(localStorage.getItem("cashSales")) || 0

let transferSales =
Number(localStorage.getItem("transferSales")) || 0

let totalItems =
Number(localStorage.getItem("totalItems")) || 0

updateSummary()
renderProducts()
renderSalesHistory()

function saveData(){

    localStorage.setItem(
        "products",
        JSON.stringify(products)
    )

    localStorage.setItem(
        "salesHistory",
        JSON.stringify(salesHistory)
    )

    localStorage.setItem(
        "totalSales",
        totalSales
    )

    localStorage.setItem(
        "cashSales",
        cashSales
    )

    localStorage.setItem(
        "transferSales",
        transferSales
    )

    localStorage.setItem(
        "totalItems",
        totalItems
    )
}

function addProduct(){

    let name =
    document.getElementById("name").value.trim()

    let category =
    document.getElementById("category").value

    let stock =
    Number(document.getElementById("stock").value)

    let price =
    Number(document.getElementById("price").value)

    if(name === "" || stock <= 0 || price <= 0){

        alert("กรอกข้อมูลให้ครบ")

        return
    }

    let existingProduct = products.find(
        p => p.name.toLowerCase() === name.toLowerCase()
    )

    if(existingProduct){

        existingProduct.stock += stock
        existingProduct.price = price

        alert("เติมสต๊อกสินค้าเรียบร้อย")

    }else{

        products.push({
            name,
            category,
            stock,
            price,
            sold:0,
            revenue:0
        })

        alert("เพิ่มสินค้าใหม่แล้ว")
    }

    saveData()

    renderProducts()

    document.getElementById("name").value = ""
    document.getElementById("stock").value = ""
    document.getElementById("price").value = ""
}

function increaseStock(index){

    products[index].stock++

    saveData()

    renderProducts()
}

function decreaseStock(index){

    if(products[index].stock > 0){

        products[index].stock--

        saveData()

        renderProducts()
    }
}

function sellProduct(index,paymentType){

    if(products[index].stock <= 0){

        alert("สินค้าหมด")

        return
    }

    products[index].stock--
    products[index].sold++
    products[index].revenue += products[index].price

    totalSales += products[index].price
    totalItems++

    if(paymentType === "cash"){
        cashSales += products[index].price
    }else{
        transferSales += products[index].price
    }

    let now = new Date()

    salesHistory.unshift({
        product: products[index].name,
        price: products[index].price,
        payment: paymentType,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString()
    })

    saveData()

    updateSummary()

    renderProducts()

    renderSalesHistory()
}

function updateSummary(){

    document.getElementById("totalSales").innerText =
    totalSales

    document.getElementById("cashSales").innerText =
    cashSales

    document.getElementById("transferSales").innerText =
    transferSales

    document.getElementById("totalItems").innerText =
    totalItems
}

function deleteProduct(index){

    if(confirm("ลบสินค้านี้ใช่ไหม?")){

        products.splice(index,1)

        saveData()

        renderProducts()
    }
}

function renderProducts(){

    let search =
    document.getElementById("searchInput")
    .value.toLowerCase()

    let html = ""

    let categories = [
        ...new Set(products.map(p => p.category))
    ]

    categories.forEach(category => {

        html += `
        <h2>${category}</h2>
        <div class="product-grid">
        `

        products.forEach((product,index)=>{

            if(
                product.category === category &&
                product.name.toLowerCase().includes(search)
            ){

                html += `
                <div class="card">

                <h3>${product.name}</h3>

                <p class="${
                    product.stock <= 3
                    ? 'stock-low'
                    : ''
                }">

                คงเหลือ ${product.stock} ชิ้น

                </p>

                <p>ราคา ${product.price} บาท</p>

                <button onclick="decreaseStock(${index})">
                ➖
                </button>

                <button onclick="increaseStock(${index})">
                ➕
                </button>

                <p>ขายแล้ว ${product.sold} ชิ้น</p>

                <p>รายได้ ${product.revenue} บาท</p>

                <button
                class="cash-btn"
                onclick="sellProduct(${index},'cash')">

                💵 เงินสด

                </button>

                <button
                class="transfer-btn"
                onclick="sellProduct(${index},'transfer')">

                📱 เงินโอน

                </button>

                <button
                class="delete-btn"
                onclick="deleteProduct(${index})">

                🗑️ ลบ

                </button>

                </div>
                `
            }

        })

        html += `</div>`
    })

    document.getElementById("productList").innerHTML =
    html
}

function renderSalesHistory(){

    let html = ""

    salesHistory.forEach(sale => {

        html += `
        <div class="sale-history">

        <strong>${sale.product}</strong><br>

        ราคา ${sale.price} บาท<br>

        ${sale.payment}<br>

        ${sale.date}<br>

        ${sale.time}

        </div>
        `
    })

    document.getElementById("salesHistory").innerHTML =
    html
}

function exportCSV(){

    let csv =
`ชื่อสินค้า,หมวดหมู่,คงเหลือ,ราคา,ขายได้,รายได้\n`

    products.forEach(product => {

        csv +=
`${product.name},${product.category},${product.stock},${product.price},${product.sold},${product.revenue}\n`

    })

    let blob = new Blob(
        [csv],
        {type:'text/csv'}
    )

    let link =
    document.createElement("a")

    link.href =
    URL.createObjectURL(blob)

    link.download =
    "stock-report.csv"

    link.click()
}

function exportBackup(){

    let backupData = {
        products,
        salesHistory,
        totalSales,
        cashSales,
        transferSales,
        totalItems
    }

    let blob = new Blob(
        [JSON.stringify(backupData)],
        {type:"application/json"}
    )

    let link =
    document.createElement("a")

    link.href =
    URL.createObjectURL(blob)

    link.download =
    "stock-backup.json"

    link.click()

    alert("Backup สำเร็จ")
}

async function importBackup(){

    try{

        let file =
        document.getElementById("importFile")
        .files[0]

        if(!file){

            alert("กรุณาเลือกไฟล์")

            return
        }

        let text = await file.text()

        let data = JSON.parse(text)

        products = data.products || []
        salesHistory = data.salesHistory || []

        totalSales = data.totalSales || 0
        cashSales = data.cashSales || 0
        transferSales = data.transferSales || 0
        totalItems = data.totalItems || 0

        saveData()

        updateSummary()

        renderProducts()

        renderSalesHistory()

        alert("Import สำเร็จ")

    }catch(error){

        console.log(error)

        alert("Import ไม่สำเร็จ")
    }
}

function clearSalesHistory(){

    if(confirm("ล้างประวัติการขายทั้งหมดใช่ไหม?")){

        salesHistory = []

        totalSales = 0
        cashSales = 0
        transferSales = 0
        totalItems = 0

        products.forEach(product => {

            product.sold = 0
            product.revenue = 0
        })

        saveData()

        updateSummary()

        renderProducts()

        renderSalesHistory()
    }
}

function resetData(){

    if(confirm("ล้างข้อมูลทั้งหมดใช่ไหม?")){

        localStorage.clear()

        location.reload()
    }
}

</script>

</body>
</html>
